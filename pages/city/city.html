<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Document</title>
        <link rel="stylesheet" href="city.css" />
        <link rel="stylesheet" href="../../share/ultis.css" />
    </head>
    <body>
        <div class="map">
            <div class="library blockMarker">
                <div class="location-marker">
                    <div class="marker-box">
                        <div class="icon-circle">
                            <i class="fa-solid fa-book-open icon-maker"></i>
                        </div>
                        <div class="marker-pointer"></div>
                    </div>
                    <div class="marker-text">Thư viện</div>
                </div>
            </div>
            <div class="people blockMarker">
                <div class="location-marker">
                    <div class="marker-box">
                        <div class="icon-circle">
                            <i class="fa-solid fa-user-group icon-maker"></i>
                        </div>
                        <div class="marker-pointer"></div>
                    </div>
                    <div class="marker-text">Cộng đồng</div>
                </div>
            </div>
            <div class="center blockMarker">
                <div class="location-marker">
                    <div class="marker-box">
                        <div class="icon-circle">
                            <i class="fa-solid fa-user-group icon-maker"></i>
                        </div>
                        <div class="marker-pointer"></div>
                    </div>
                    <div class="marker-text">Trung tâm</div>
                </div>
            </div>
            <div class="school blockMarker">
                <div class="location-marker">
                    <div class="marker-box">
                        <div class="icon-circle">
                            <i class="fa-solid fa-user-group icon-maker"></i>
                        </div>
                        <div class="marker-pointer"></div>
                    </div>
                    <div class="marker-text">Trường học</div>
                </div>
            </div>
            <div class="event blockMarker">
                <div class="location-marker">
                    <div class="marker-box">
                        <div class="icon-circle">
                            <i class="fa-solid fa-user-group icon-maker"></i>
                        </div>
                        <div class="marker-pointer"></div>
                    </div>
                    <div class="marker-text">Sự kiện</div>
                </div>
            </div>
            <div class="shop blockMarker">
                <div class="location-marker">
                    <div class="marker-box">
                        <div class="icon-circle">
                            <i class="fa-solid fa-user-group icon-maker"></i>
                        </div>
                        <div class="marker-pointer"></div>
                    </div>
                    <div class="marker-text">Cửa hàng</div>
                </div>
            </div>
        </div>
        
        <div class="nav-arrow left-arrow" id="scrollLeftBtn">
            <i class="fas fa-chevron-left"></i>
        </div>
        <div class="nav-arrow right-arrow" id="scrollRightBtn">
            <i class="fas fa-chevron-right"></i>
        </div>

        <script src="https://kit.fontawesome.com/c4edd7a73c.js" crossorigin="anonymous"></script>
        <script src="city.js"></script>
    </body>
</html>
