<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Document</title>
        <link rel="stylesheet" href="city.css" />
        <link rel="stylesheet" href="../../share/ultis.css" />
        <link rel="stylesheet" href="../../component/header/header.css" />
        <link rel="stylesheet" href="../../component/footer/footer.css">
        <link rel="stylesheet" href="../../component/personalItem/personalItem.css">
        <link rel="stylesheet" href="../../component/navButton/navbutton.css">
        <link rel="stylesheet" href="../../component/battleCard/battleCard.css">
        <link rel="stylesheet" href="../../component/modalNotifi/modal.css">
        <link rel="stylesheet" href="../../component/phoneModal/phonemodal.css">
        <link rel="stylesheet" href="../../component/battleCard/battleCard.css">
        <link rel="stylesheet" href="../../component/foodApp/foodApp.css">
    </head>
    <body>
        <header id="game-header"></header>
        <div class="map">
            <div class="library blockMarker">
                <div class="location-marker">
                    <div class="marker-box">
                        <div class="icon-circle">
                            <i class="fa-solid fa-book-open icon-marker"></i>
                        </div>
                        <div class="marker-pointer"></div>
                    </div>
                    <div class="marker-text">Thư viện</div>
                </div>
            </div>
            <div class="people blockMarker">
                <div class="location-marker">
                    <div class="marker-box">
                        <div class="icon-circle">
                            <i class="fa-solid fa-user-group icon-marker"></i>
                        </div>
                        <div class="marker-pointer"></div>
                    </div>
                    <div class="marker-text">Cộng đồng</div>
                </div>
            </div>
            <div class="center blockMarker">
                <div class="location-marker">
                    <div class="marker-box">
                        <div class="icon-circle">
                            <i class="fa-solid fa-location-dot icon-marker"></i></i>
                        </div>
                        <div class="marker-pointer"></div>
                    </div>
                    <div class="marker-text">Trung tâm</div>
                </div>
            </div>
            <div class="school blockMarker">
                <div class="location-marker">
                    <div class="marker-box">
                        <div class="icon-circle">
                            <i class="fa-solid fa-graduation-cap icon-marker"></i></i>
                        </div>
                        <div class="marker-pointer"></div>
                    </div>
                    <div class="marker-text">Trường học</div>
                </div>
            </div>
            <div class="event blockMarker">
                <div class="location-marker">
                    <div class="marker-box">
                        <div class="icon-circle">
                            <i class="fa-solid fa-calendar-days icon-marker"></i></i>
                        </div>
                        <div class="marker-pointer"></div>
                    </div>
                    <div class="marker-text">Sự kiện</div>
                </div>
            </div>
            <div class="shop blockMarker">
                <div class="location-marker">
                    <div class="marker-box">
                        <div class="icon-circle">
                            <i class="fa-solid fa-cart-shopping icon-marker"></i></i>
                        </div>
                        <div class="marker-pointer"></div>
                    </div>
                    <div class="marker-text">Cửa hàng</div>
                </div>
            </div>
        </div>
        
        <div class="nav-arrow left-arrow" id="scrollLeftBtn">
            <i class="fas fa-chevron-left"></i>
        </div>
        <div class="nav-arrow right-arrow" id="scrollRightBtn">
            <i class="fas fa-chevron-right"></i>
        </div>
        <footer></footer>
        <script src="https://kit.fontawesome.com/c4edd7a73c.js" crossorigin="anonymous"></script>
        <script type="module" src="../../component/footer/footer.js"></script>
        <script type="module" src="../../component/header/header.js"></script>
        <script src="../../component/modalNotifi/modal.js"></script>
        <script type="module" src="./city.js"></script>
    </body>
</html>
